<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>web socket server demo</h1>
    <div>
        <input type="text" placeholder="Enter your message here" id="message_input">
        <button id="message-send-button">Send</button>
        <ul id="message-container"></ul>
    </div>
    <script>
        //DOM
        const messageInput = document.getElementById('message_input');
        const messageSendButton = document.getElementById('message-send-button')
        const messageContainer = document.getElementById('message-container');

        const {port} = window.location;
        const connection = new WebSocket(`ws://localhost:${port}`);
        connection.onopen = ()=>{
            connection.onmessage = (message)=>{
                console.log('message received: ',message);
                const rawData = message.data
                const parsedData = JSON.parse(rawData)
                const text = parsedData.message;

                const li = document.createElement('li')
                li.innerText = text
                messageContainer.appendChild(li)
            }
           messageSendButton.addEventListener('click', (e)=>{
            const value = messageInput.value;
            connection.send(JSON.stringify({message: value}))
           })
        }
    </script>
</body>

</html>
